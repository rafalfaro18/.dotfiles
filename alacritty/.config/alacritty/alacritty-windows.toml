# Do not import this file in Linux
# In Windows import ONLY this one instead of importing alacritty-personal.toml
[general]
import = [
    "~/.config/alacritty/alacritty-personal.toml",
]

# Maximized causes non-stop Windows Bell when you type
[window]
startup_mode = "Windowed"

[terminal.shell]
program = "wsl.exe"
args = ["~"]
